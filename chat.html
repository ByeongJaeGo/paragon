<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PARAGON — 채팅</title>
  <link rel="canonical" href="https://paragon-inky.vercel.app/chat.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

    (function(c,l,a,r,i,t,y){
      c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
      t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;

    })(window, document, "clarity", "script", "xebbg4j2dh");

<body class="chat-page">
  <header class="header">
    <nav class="nav container">
      <a href="index.html" class="logo">PARAGON</a>
      <a href="index.html" class="btn btn-ghost">마켓으로</a>
    </nav>
  </header>

  <main class="container chat-layout">
    <section class="chat-header" id="chatHeader"></section>
    <section class="chat-messages" id="chatMessages" aria-live="polite"></section>
    <form class="chat-form" id="chatForm">
      <input type="text" name="message" placeholder="메시지를 입력하세요" required autocomplete="off">
      <button type="submit" class="btn btn-primary">전송</button>
    </form>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <p>&copy; 2026 PARAGON</p>
      <nav class="footer-links">
        <a href="privacy.html">개인정보처리방침</a>
        <a href="index.html">마켓 홈</a>
      </nav>
    </div>
  </footer>

  <script src="js/platform-config.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
